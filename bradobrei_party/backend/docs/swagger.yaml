basePath: /api/v1
definitions:
  dto.CreateBookingRequest:
    properties:
      master_id:
        type: integer
      notes:
        type: string
      salon_id:
        type: integer
      service_ids:
        items:
          type: integer
        minItems: 1
        type: array
      start_time:
        type: string
    required:
    - salon_id
    - service_ids
    - start_time
    type: object
  dto.ErrorResponse:
    properties:
      code:
        type: integer
      error:
        type: string
      message:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/models.User'
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      full_name:
        type: string
      password:
        minLength: 6
        type: string
      phone:
        type: string
      role:
        $ref: '#/definitions/models.UserRole'
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - full_name
    - password
    - username
    type: object
  models.Booking:
    properties:
      client:
        $ref: '#/definitions/models.User'
      client_id:
        type: integer
      created_at:
        type: string
      duration_minutes:
        type: integer
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/models.BookingItem'
        type: array
      master:
        $ref: '#/definitions/models.User'
      master_id:
        type: integer
      notes:
        type: string
      payment:
        $ref: '#/definitions/models.Payment'
      salon:
        $ref: '#/definitions/models.Salon'
      salon_id:
        type: integer
      start_time:
        type: string
      status:
        $ref: '#/definitions/models.BookingStatus'
      total_price:
        type: number
      updated_at:
        type: string
    type: object
  models.BookingItem:
    properties:
      booking_id:
        type: integer
      id:
        type: integer
      price_at_booking:
        type: number
      quantity:
        type: integer
      service:
        $ref: '#/definitions/models.Service'
      service_id:
        type: integer
    type: object
  models.BookingStatus:
    enum:
    - PENDING
    - CONFIRMED
    - IN_PROGRESS
    - COMPLETED
    - CANCELLED
    type: string
    x-enum-varnames:
    - BookingPending
    - BookingConfirmed
    - BookingInProgress
    - BookingCompleted
    - BookingCancelled
  models.EmployeeProfile:
    properties:
      created_at:
        type: string
      expected_salary:
        type: number
      id:
        type: integer
      salons:
        items:
          $ref: '#/definitions/models.Salon'
        type: array
      services:
        items:
          $ref: '#/definitions/models.Service'
        type: array
      specialization:
        type: string
      updated_at:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
      work_schedule:
        type: string
    type: object
  models.Material:
    properties:
      id:
        type: integer
      name:
        type: string
      unit:
        type: string
    type: object
  models.Payment:
    properties:
      amount:
        type: number
      booking_id:
        type: integer
      completed_at:
        type: string
      created_at:
        type: string
      external_transaction_id:
        type: string
      id:
        type: integer
      status:
        $ref: '#/definitions/models.PaymentStatus'
    type: object
  models.PaymentStatus:
    enum:
    - PENDING
    - SUCCESS
    - FAILED
    - REFUNDED
    type: string
    x-enum-varnames:
    - PaymentPending
    - PaymentSuccess
    - PaymentFailed
    - PaymentRefunded
  models.Salon:
    properties:
      address:
        type: string
      base_hourly_rate:
        type: number
      created_at:
        type: string
      employees:
        items:
          $ref: '#/definitions/models.EmployeeProfile'
        type: array
      id:
        type: integer
      location:
        type: string
      max_staff:
        type: integer
      name:
        type: string
      status:
        type: string
      updated_at:
        type: string
      working_hours:
        type: string
    type: object
  models.Service:
    properties:
      created_at:
        type: string
      description:
        type: string
      duration_minutes:
        type: integer
      employees:
        items:
          $ref: '#/definitions/models.EmployeeProfile'
        type: array
      id:
        type: integer
      materials:
        items:
          $ref: '#/definitions/models.ServiceMaterial'
        type: array
      name:
        type: string
      price:
        type: number
      updated_at:
        type: string
    type: object
  models.ServiceMaterial:
    properties:
      material:
        $ref: '#/definitions/models.Material'
      material_id:
        type: integer
      quantity_per_use:
        type: number
      service:
        $ref: '#/definitions/models.Service'
      service_id:
        type: integer
    type: object
  models.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      employee_profile:
        $ref: '#/definitions/models.EmployeeProfile'
      full_name:
        type: string
      id:
        type: integer
      phone:
        type: string
      role:
        $ref: '#/definitions/models.UserRole'
      updated_at:
        type: string
      username:
        type: string
    type: object
  models.UserRole:
    enum:
    - CLIENT
    - BASIC_MASTER
    - ADVANCED_MASTER
    - HR_SPECIALIST
    - ACCOUNTANT
    - NETWORK_MANAGER
    - ADMINISTRATOR
    type: string
    x-enum-varnames:
    - RoleClient
    - RoleBasicMaster
    - RoleAdvancedMaster
    - RoleHR
    - RoleAccountant
    - RoleNetworkManager
    - RoleAdmin
info:
  contact: {}
  description: Backend API для системы управления сетью барбершопов Bradobrei Party.
  title: Bradobrei Party API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Проверяет логин и пароль, возвращает JWT.
      parameters:
      - description: Данные для входа
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Вход в систему
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Создаёт нового пользователя в системе.
      parameters:
      - description: Данные регистрации
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Регистрация пользователя
      tags:
      - auth
  /bookings:
    post:
      consumes:
      - application/json
      description: Основа пользовательского сценария записи клиента. Используется
        в отчётах 2.2.2, 2.2.4, 2.2.7 и 2.2.8.
      parameters:
      - description: Данные бронирования
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateBookingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Booking'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Создать бронирование
      tags:
      - bookings
  /reports/employees:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Отчёт 2.2.1 Реестр персонала
      tags:
      - reports
  /reports/master-activity:
    get:
      parameters:
      - description: Начало периода YYYY-MM-DD
        in: query
        name: from
        type: string
      - description: Конец периода YYYY-MM-DD
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Отчёт 2.2.4 Активность мастеров
      tags:
      - reports
  /reports/reviews:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Отчёт 2.2.5 Отзывы
      tags:
      - reports
  /reports/salon-activity:
    get:
      parameters:
      - description: Начало периода YYYY-MM-DD
        in: query
        name: from
        type: string
      - description: Конец периода YYYY-MM-DD
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Отчёт 2.2.2 Активность филиалов
      tags:
      - reports
  /reports/service-popularity:
    get:
      parameters:
      - description: Начало периода YYYY-MM-DD
        in: query
        name: from
        type: string
      - description: Конец периода YYYY-MM-DD
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Отчёт 2.2.3 Популярность услуг
      tags:
      - reports
  /salons:
    get:
      description: Базовый справочный эндпоинт для клиентского просмотра доступных
        филиалов и аналитики 2.2.2.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Salon'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Список салонов
      tags:
      - salons
schemes:
- http
swagger: "2.0"
