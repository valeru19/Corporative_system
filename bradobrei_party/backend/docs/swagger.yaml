basePath: /api/v1
definitions:
  dto.AssignServiceToMasterRequest:
    properties:
      target_user_id:
        example: 12
        type: integer
    required:
    - target_user_id
    type: object
  dto.CreateBookingRequest:
    properties:
      master_id:
        example: 2
        type: integer
      notes:
        example: Клиент просит оформить бороду и стрижку без ожидания.
        type: string
      salon_id:
        example: 1
        type: integer
      service_ids:
        example:
        - 1
        - 2
        items:
          type: integer
        minItems: 1
        type: array
      start_time:
        example: "2026-03-29T14:00:00Z"
        type: string
    required:
    - salon_id
    - service_ids
    - start_time
    type: object
  dto.CreatePaymentRequest:
    properties:
      amount:
        example: 2500
        type: number
      booking_id:
        example: 1
        type: integer
      external_transaction_id:
        example: txn_local_12345
        type: string
      status:
        allOf:
        - $ref: '#/definitions/models.PaymentStatus'
        example: PENDING
    required:
    - booking_id
    type: object
  dto.CreateReviewRequest:
    properties:
      rating:
        example: 5
        maximum: 5
        minimum: 1
        type: integer
      text:
        example: Отличный сервис и удобная запись.
        type: string
    required:
    - rating
    - text
    type: object
  dto.CreateServiceRequest:
    properties:
      description:
        example: Стрижка с оформлением висков и затылка
        type: string
      duration_minutes:
        example: 75
        minimum: 1
        type: integer
      name:
        example: Мужская стрижка
        type: string
      price:
        example: 1800
        type: number
    required:
    - duration_minutes
    - name
    - price
    type: object
  dto.ErrorResponse:
    properties:
      code:
        example: 400
        type: integer
      error:
        example: bad_request
        type: string
      message:
        example: invalid request body
        type: string
    type: object
  dto.LoginRequest:
    properties:
      password:
        example: password
        type: string
      username:
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  dto.LoginResponse:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dev-token
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      email:
        example: admin@example.com
        type: string
      full_name:
        example: Иван Петров
        type: string
      password:
        example: password
        minLength: 6
        type: string
      phone:
        example: "+79991234567"
        type: string
      role:
        allOf:
        - $ref: '#/definitions/models.UserRole'
        example: ADMINISTRATOR
      username:
        example: admin
        maxLength: 50
        minLength: 3
        type: string
    required:
    - full_name
    - password
    - username
    type: object
  dto.SetInventoryQuantityRequest:
    properties:
      quantity:
        example: 25
        minimum: 0
        type: number
    required:
    - quantity
    type: object
  dto.UpdateServiceRequest:
    properties:
      description:
        example: Стрижка с оформлением висков и затылка
        type: string
      duration_minutes:
        example: 90
        minimum: 1
        type: integer
      name:
        example: Мужская стрижка
        type: string
      price:
        example: 1900
        type: number
    required:
    - duration_minutes
    - name
    - price
    type: object
  dto.UseServiceRequest:
    properties:
      quantity:
        example: 1
        minimum: 1
        type: integer
      salon_id:
        example: 1
        type: integer
    required:
    - quantity
    - salon_id
    type: object
  dto.UserResponse:
    properties:
      user:
        $ref: '#/definitions/models.User'
    type: object
  models.Booking:
    properties:
      client:
        $ref: '#/definitions/models.User'
      client_id:
        type: integer
      created_at:
        type: string
      duration_minutes:
        type: integer
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/models.BookingItem'
        type: array
      master:
        $ref: '#/definitions/models.User'
      master_id:
        type: integer
      notes:
        type: string
      payment:
        $ref: '#/definitions/models.Payment'
      salon:
        $ref: '#/definitions/models.Salon'
      salon_id:
        type: integer
      start_time:
        type: string
      status:
        $ref: '#/definitions/models.BookingStatus'
      total_price:
        type: number
      updated_at:
        type: string
    type: object
  models.BookingItem:
    properties:
      booking_id:
        type: integer
      id:
        type: integer
      price_at_booking:
        type: number
      quantity:
        type: integer
      service:
        $ref: '#/definitions/models.Service'
      service_id:
        type: integer
    type: object
  models.BookingStatus:
    enum:
    - PENDING
    - CONFIRMED
    - IN_PROGRESS
    - COMPLETED
    - CANCELLED
    type: string
    x-enum-varnames:
    - BookingPending
    - BookingConfirmed
    - BookingInProgress
    - BookingCompleted
    - BookingCancelled
  models.EmployeeProfile:
    properties:
      created_at:
        type: string
      expected_salary:
        type: number
      id:
        type: integer
      salons:
        items:
          $ref: '#/definitions/models.Salon'
        type: array
      services:
        items:
          $ref: '#/definitions/models.Service'
        type: array
      specialization:
        type: string
      updated_at:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
      work_schedule:
        description: '{"mon":"9-18","tue":"9-18",...}'
        type: string
    type: object
  models.Inventory:
    properties:
      id:
        type: integer
      last_updated:
        type: string
      material:
        $ref: '#/definitions/models.Material'
      material_id:
        type: integer
      quantity:
        type: number
      salon:
        $ref: '#/definitions/models.Salon'
      salon_id:
        type: integer
    type: object
  models.Material:
    properties:
      id:
        type: integer
      name:
        type: string
      unit:
        description: мл, шт, гр
        type: string
    type: object
  models.Payment:
    properties:
      amount:
        type: number
      booking_id:
        type: integer
      completed_at:
        type: string
      created_at:
        type: string
      external_transaction_id:
        type: string
      id:
        type: integer
      status:
        $ref: '#/definitions/models.PaymentStatus'
    type: object
  models.PaymentStatus:
    enum:
    - PENDING
    - SUCCESS
    - FAILED
    - REFUNDED
    type: string
    x-enum-varnames:
    - PaymentPending
    - PaymentSuccess
    - PaymentFailed
    - PaymentRefunded
  models.Review:
    properties:
      created_at:
        type: string
      id:
        type: integer
      rating:
        description: 1-5
        type: integer
      text:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
    type: object
  models.Salon:
    properties:
      address:
        type: string
      base_hourly_rate:
        type: number
      created_at:
        type: string
      employees:
        items:
          $ref: '#/definitions/models.EmployeeProfile'
        type: array
      id:
        type: integer
      location:
        description: PostGIS, опционально
        type: string
      max_staff:
        type: integer
      name:
        type: string
      status:
        description: OPEN/CLOSED
        type: string
      updated_at:
        type: string
      working_hours:
        type: string
    type: object
  models.Service:
    properties:
      created_at:
        type: string
      description:
        type: string
      duration_minutes:
        type: integer
      employees:
        items:
          $ref: '#/definitions/models.EmployeeProfile'
        type: array
      id:
        type: integer
      materials:
        items:
          $ref: '#/definitions/models.ServiceMaterial'
        type: array
      name:
        type: string
      price:
        type: number
      updated_at:
        type: string
    type: object
  models.ServiceMaterial:
    properties:
      material:
        $ref: '#/definitions/models.Material'
      material_id:
        type: integer
      quantity_per_use:
        type: number
      service:
        $ref: '#/definitions/models.Service'
      service_id:
        type: integer
    type: object
  models.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      employee_profile:
        $ref: '#/definitions/models.EmployeeProfile'
      full_name:
        type: string
      id:
        type: integer
      phone:
        type: string
      role:
        $ref: '#/definitions/models.UserRole'
      updated_at:
        type: string
      username:
        type: string
    type: object
  models.UserRole:
    enum:
    - CLIENT
    - BASIC_MASTER
    - ADVANCED_MASTER
    - HR_SPECIALIST
    - ACCOUNTANT
    - NETWORK_MANAGER
    - ADMINISTRATOR
    type: string
    x-enum-varnames:
    - RoleClient
    - RoleBasicMaster
    - RoleAdvancedMaster
    - RoleHR
    - RoleAccountant
    - RoleNetworkManager
    - RoleAdmin
info:
  contact: {}
  description: Backend API для системы управления сетью барбершопов Bradobrei Party.
  title: Bradobrei Party API
  version: "1.0"
paths:
  /:
    get:
      description: Перенаправляет на Swagger UI.
      responses: {}
      summary: Перейти к документации
      tags:
      - docs
  /auth/login:
    post:
      consumes:
      - application/json
      description: Проверяет логин и пароль, возвращает только JWT для дальнейшей
        авторизации.
      parameters:
      - description: Данные для входа
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Вход в систему
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Создаёт нового пользователя в системе.
      parameters:
      - description: Данные регистрации
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Регистрация пользователя
      tags:
      - auth
  /bookings:
    get:
      description: Возвращает все бронирования для административного и аналитического
        просмотра.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Booking'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Список бронирований
      tags:
      - bookings
    post:
      consumes:
      - application/json
      description: Основа пользовательского сценария записи клиента. Используется
        в отчётах 2.2.2, 2.2.4, 2.2.7 и 2.2.8.
      parameters:
      - description: Данные бронирования
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateBookingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Booking'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Создать бронирование
      tags:
      - bookings
  /bookings/{id}:
    get:
      description: Возвращает одно бронирование со связанными услугами и платежом.
      parameters:
      - description: ID бронирования
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Booking'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Бронирование по ID
      tags:
      - bookings
  /bookings/{id}/cancel:
    post:
      description: Отменяет бронирование по правилам роли и владельца записи.
      parameters:
      - description: ID бронирования
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Отменить бронирование
      tags:
      - bookings
  /bookings/{id}/confirm:
    post:
      description: Подтверждает бронирование и списывает материалы.
      parameters:
      - description: ID бронирования
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Booking'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Подтвердить бронирование
      tags:
      - bookings
  /bookings/master:
    get:
      description: Рабочий эндпоинт мастера для просмотра назначенных записей.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Booking'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Бронирования мастера
      tags:
      - bookings
  /bookings/my:
    get:
      description: Возвращает бронирования текущего клиента.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Booking'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Мои бронирования
      tags:
      - bookings
  /inventories/salon/{salonId}:
    get:
      description: Возвращает фактические остатки материалов на складе выбранного
        салона.
      parameters:
      - description: ID салона
        in: path
        name: salonId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Inventory'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Остатки материалов по салону
      tags:
      - inventories
  /inventories/salon/{salonId}/material/{materialId}:
    put:
      consumes:
      - application/json
      description: Устанавливает фактическое количество материала на складе конкретного
        салона по ID материала.
      parameters:
      - description: ID салона
        in: path
        name: salonId
        required: true
        type: integer
      - description: ID материала
        in: path
        name: materialId
        required: true
        type: integer
      - description: Новое количество материала
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.SetInventoryQuantityRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Inventory'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Обновить остаток материала на складе
      tags:
      - inventories
  /materials:
    get:
      description: Возвращает все материалы.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Material'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Список материалов
      tags:
      - materials
    post:
      consumes:
      - application/json
      description: Создаёт новый материал.
      parameters:
      - description: Данные материала
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.Material'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Material'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Создать материал
      tags:
      - materials
  /materials/{id}:
    delete:
      description: Удаляет материал.
      parameters:
      - description: ID материала
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Удалить материал
      tags:
      - materials
    get:
      description: Возвращает один материал по идентификатору.
      parameters:
      - description: ID материала
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Material'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Материал по ID
      tags:
      - materials
    put:
      consumes:
      - application/json
      description: Обновляет существующий материал.
      parameters:
      - description: ID материала
        in: path
        name: id
        required: true
        type: integer
      - description: Обновлённые данные материала
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.Material'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Material'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Обновить материал
      tags:
      - materials
  /materials/service/{serviceId}:
    put:
      consumes:
      - application/json
      description: Назначает список материалов и норм расхода для выбранной услуги.
      parameters:
      - description: ID услуги
        in: path
        name: serviceId
        required: true
        type: integer
      - description: Материалы услуги
        in: body
        name: request
        required: true
        schema:
          items:
            $ref: '#/definitions/models.ServiceMaterial'
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Установить норму расхода для услуги
      tags:
      - materials
  /me:
    get:
      description: Возвращает пользователя, идентифицированного по JWT из заголовка
        Authorization.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Текущий пользователь
      tags:
      - auth
  /payments:
    get:
      description: Возвращает список платежей по бронированиям.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Payment'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Список платежей
      tags:
      - payments
    post:
      consumes:
      - application/json
      description: Создаёт платёж для существующего бронирования.
      parameters:
      - description: Данные платежа
        in: body
        name: request
