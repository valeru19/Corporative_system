{{define "content"}}
<section class="report-section">
  <div class="summary-grid">
    <article class="summary-card">
      <span>Услуг в выборке</span>
      <strong>{{len .Rows}}</strong>
    </article>
    <article class="summary-card">
      <span>Отчёт</span>
      <strong>Популярность услуг</strong>
    </article>
    <article class="summary-card">
      <span>Период</span>
      <strong>{{safePeriod .Meta.PeriodFrom .Meta.PeriodTo}}</strong>
    </article>
  </div>

  <table class="report-table">
    <thead>
      <tr>
        <th>ID услуги</th>
        <th>Услуга</th>
        <th>Использований</th>
        <th>Доля</th>
      </tr>
    </thead>
    <tbody>
      {{range .Rows}}
      <tr>
        <td>{{.ServiceID}}</td>
        <td>{{.ServiceName}}</td>
        <td>{{.UsageCount}}</td>
        <td>{{printf "%.2f%%" (mul100 .RelativeFreq)}}</td>
      </tr>
      {{end}}
    </tbody>
  </table>
</section>
{{end}}
