version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: bradobrei_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bradobrei
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bradobrei_api
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
    ports:
      - "8080:8080"

volumes:
  pgdata: