{{define "content"}}
<section class="report-section">
  <div class="summary-grid">
    <article class="summary-card">
      <span>Отзывов</span>
      <strong>{{len .Rows}}</strong>
    </article>
    <article class="summary-card">
      <span>Отчёт</span>
      <strong>Мониторинг качества</strong>
    </article>
    <article class="summary-card">
      <span>Период</span>
      <strong>{{safePeriod .Meta.PeriodFrom .Meta.PeriodTo}}</strong>
    </article>
  </div>

  <table class="report-table">
    <thead>
      <tr>
        <th>Автор</th>
        <th>Оценка</th>
        <th>Отзыв</th>
        <th>Дата</th>
      </tr>
    </thead>
    <tbody>
      {{range .Rows}}
      <tr>
        <td>{{.Author}}</td>
        <td>{{.Rating}} / 5</td>
        <td>{{.Text}}</td>
        <td>{{formatDateTime .CreatedAt}}</td>
      </tr>
      {{end}}
    </tbody>
  </table>
</section>
{{end}}
